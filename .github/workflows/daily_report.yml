name: CMS SST Report

on:
  schedule:
    # Every 30 minutes, 05:00-19:30 UTC (07:00-21:30 ora italiana)
    - cron: "0,30 5-19 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push docs/index.html

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore article cache
        uses: actions/cache@v4
        with:
          path: documentation/ggus_article_cache.json
          key: ggus-article-cache-v5-${{ runner.os }}

      - name: Generate report
        env:
          GGUS_TOKEN:     ${{ secrets.GGUS_TOKEN }}
          TRIGGER_TOKEN:  ${{ secrets.TRIGGER_TOKEN }}
        run: |
          python3 cms_site_report.py \
            --days 3 \
            --out docs/index.html

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if something changed
          git diff --cached --quiet || \
            git commit -m "chore: update daily CMS SST report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash
          git push
